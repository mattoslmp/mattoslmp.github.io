<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interesse em Cursos e Soluções em Bioinformática e IA</title>
  <meta name="description" content="Pesquisa rápida para validar interesse em cursos, ferramentas, serviços, colaboração e consultoria em Bioinformática, IA, descoberta de enzimas e produtos naturais." />
  <meta property="og:title" content="Interesse em Cursos e Soluções em Bioinformática e IA" />
  <meta property="og:description" content="Leva menos de 30 segundos. Respostas privadas para avaliar interesse em cursos, ferramentas, serviços, colaboração e consultoria." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --bg: #f3f7fb;
      --card: #ffffff;
      --text: #122033;
      --muted: #4a5d73;
      --accent: #0b6fd8;
      --accent-hover: #095eb7;
      --border: #d6e1ee;
      --success-bg: #e9f9ef;
      --success-text: #0a5a2a;
      --shadow: 0 12px 30px rgba(18, 32, 51, 0.12);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #f7fbff 0%, #eef4fb 45%, #e9f1fa 100%);
      line-height: 1.45;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      background: #edf3fa;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.88rem;
      text-decoration: none;
      border: 1px solid transparent;
      color: #2d435c;
      font-weight: 600;
    }

    .tab.active {
      background: #fff;
      border-color: var(--border);
      color: #103a66;
    }

    .lang-switcher {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .lang-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      font-size: 0.82rem;
      padding: 6px 11px;
      cursor: pointer;
      font-weight: 600;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(1.35rem, 2.9vw, 2rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .quick-note,
    .privacy-note {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.92rem;
      background: #f4f8fd;
      border: 1px solid #d8e4f2;
      color: #2d4a66;
    }

    form {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    fieldset {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    legend {
      font-weight: 700;
      padding: 0 4px;
      font-size: 0.95rem;
    }

    .helper {
      margin: 4px 0 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.93rem;
    }

    .option input { margin-top: 2px; }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 600;
      font-size: 0.92rem;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
    }

    .optional {
      color: var(--muted);
      font-weight: 500;
      font-size: 0.82rem;
    }

    .cta {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
      width: 100%;
    }

    .cta:hover,
    .cta:focus-visible {
      background: var(--accent-hover);
    }

    .success {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #c7efd4;
      background: var(--success-bg);
      color: var(--success-text);
      font-weight: 700;
      text-align: center;
    }

    footer {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 720px) {
      .card { padding: 18px; }
      .options,
      .row { grid-template-columns: 1fr; }
      .tab { padding: 7px 11px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="headline">
      <div class="topbar">
        <nav class="tabs" aria-label="Navigation">
          <a class="tab" href="/#contato" data-i18n="tabContact">Contato</a>
          <a class="tab active" href="/interesse/" data-i18n="tabInterest">Interesse</a>
        </nav>

        <div class="lang-switcher" role="group" aria-label="Language selector">
          <button class="lang-btn active" type="button" data-lang="pt">Português</button>
          <button class="lang-btn" type="button" data-lang="en">English</button>
          <button class="lang-btn" type="button" data-lang="es">Español</button>
        </div>
      </div>

      <h1 id="headline" data-i18n="headline"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
      <p class="quick-note" data-i18n="under30"></p>
      <p class="privacy-note" data-i18n="privacy"></p>

      <form id="interestForm" action="https://formspree.io/f/REPLACE_WITH_FORM_ID" method="POST">
        <fieldset>
          <legend data-i18n="qInterest"></legend>
          <div class="options" id="interestOptions"></div>
        </fieldset>

        <fieldset>
          <legend data-i18n="qTopics"></legend>
          <p class="helper" data-i18n="qTopicsHelp"></p>
          <div class="options" id="topicOptions"></div>
        </fieldset>

        <fieldset>
          <legend data-i18n="qFormat"></legend>
          <div class="options" id="formatOptions"></div>
        </fieldset>

        <div class="row">
          <fieldset>
            <legend data-i18n="qLive"></legend>
            <div class="options" id="liveOptions"></div>
          </fieldset>

          <label for="regionInput">
            <span data-i18n="qRegion"></span>
            <input id="regionInput" name="state_region_country" type="text" autocomplete="address-level1" required />
          </label>
        </div>

        <fieldset>
          <legend data-i18n="qBackground"></legend>
          <div class="options" id="backgroundOptions"></div>
        </fieldset>

        <fieldset>
          <legend data-i18n="qUpdates"></legend>
          <div class="options" id="updatesOptions"></div>
        </fieldset>

        <div class="row">
          <label for="emailInput">
            <span data-i18n="qEmail"></span>
            <input id="emailInput" name="email" type="email" autocomplete="email" />
          </label>
          <label for="phoneInput">
            <span data-i18n="qPhone"></span>
            <input id="phoneInput" name="whatsapp_phone" type="text" autocomplete="tel" />
          </label>
        </div>

        <fieldset>
          <legend data-i18n="qOpportunities"></legend>
          <div class="options" id="opportunityOptions"></div>
        </fieldset>

        <button class="cta" type="submit" data-i18n="submit"></button>
      </form>

      <div class="success" id="successMessage" role="status" aria-live="polite"></div>

      <footer data-i18n="footer"></footer>
    </section>
  </main>

  <script>
    const i18n = {

        under30: "⏱️ Esta pesquisa leva menos de 30 segundos.",

        qOpportunities: "J) Também teria interesse em contato para outras oportunidades?",
        submit: "Enviar resposta",

        interest: ["Muito interessado(a)", "Talvez interessado(a)", "Apenas curioso(a)"],
        topics: [
          "IA para descoberta de enzimas",

        background: ["Estudante de graduação", "Estudante de pós-graduação", "Pesquisador(a)", "Profissional da indústria", "Outro"],
        updates: ["Sim", "Não"],
        opportunities: ["Serviços", "Colaboração", "Consultoria", "Não, apenas cursos/ferramentas"]
      },
      en: {
        htmlLang: "en",
        title: "Interest in Bioinformatics and AI Courses & Solutions",
        metaDescription: "Quick survey to validate interest in courses, tools, services, collaboration, and consulting in Bioinformatics, AI, enzyme discovery, and natural products.",
        ogTitle: "Interest in Bioinformatics and AI Courses & Solutions",
        ogDescription: "Takes less than 30 seconds. Private responses to evaluate interest in future courses, tools, services, collaboration, and consulting.",
        tabContact: "Contact",
        tabInterest: "Interest",
        headline: "Help shape upcoming courses, tools, and services",
        subtitle: "We are validating demand in Bioinformatics, AI, enzyme discovery, natural products, and AI assistants.",

        qLive: "D) Where do you live?",
        qRegion: "E) State / region / country",
        qBackground: "F) Background",
        qUpdates: "G) Would you like to receive updates about future courses or tools?",
        qEmail: "H) Email (optional)",
        qPhone: "I) WhatsApp / phone (optional)",
        qOpportunities: "J) Would you also be interested in being contacted for other opportunities?",
        submit: "Submit response",
        success: "Thank you! Your response has been received successfully.",
        footer: "Private market-validation survey. No public display of responses.",
        interest: ["Very interested", "Maybe interested", "Just curious"],

          "AI for enzyme discovery",

        ],
        formats: ["Online live", "Online recorded", "Hybrid", "In person"],
        live: ["Brazil", "Outside Brazil"],
        background: ["Undergraduate student", "Graduate student", "Researcher", "Industry professional", "Other"],
        updates: ["Yes", "No"],
        opportunities: ["Services", "Collaboration", "Consulting", "No, only courses/tools"]
      },
      es: {
        htmlLang: "es",
        title: "Interés en Cursos y Soluciones de Bioinformática e IA",
        metaDescription: "Encuesta rápida para validar interés en cursos, herramientas, servicios, colaboración y consultoría en Bioinformática, IA, descubrimiento de enzimas y productos naturales.",
        ogTitle: "Interés en Cursos y Soluciones de Bioinformática e IA",
        ogDescription: "Toma menos de 30 segundos. Respuestas privadas para evaluar interés en cursos, herramientas, servicios, colaboración y consultoría.",
        tabContact: "Contacto",
        tabInterest: "Interés",
        headline: "Ayuda a orientar los próximos cursos, herramientas y servicios",
        subtitle: "Estamos validando demanda en Bioinformática, IA, descubrimiento de enzimas, productos naturales y asistentes de IA.",
        under30: "⏱️ Esta encuesta toma menos de 30 segundos.",
        privacy: "🔒 Tus respuestas son privadas y solo visibles para el propietario del sitio a través de Formspree. Se usarán únicamente para evaluar interés en futuros cursos, herramientas, servicios, colaboración y consultoría.",
        qInterest: "A) Nivel de interés",
        qTopics: "B) Temas de interés",
        qTopicsHelp: "Selecciona uno o más temas.",
        qFormat: "C) Formato preferido",
        qLive: "D) ¿Dónde vives?",
        qRegion: "E) Estado / región / país",
        qBackground: "F) Perfil",
        qUpdates: "G) ¿Te gustaría recibir novedades sobre futuros cursos o herramientas?",
        qEmail: "H) Correo electrónico (opcional)",
        qPhone: "I) WhatsApp / teléfono (opcional)",
        qOpportunities: "J) ¿También te interesaría ser contactado para otras oportunidades?",
        submit: "Enviar respuesta",
        success: "¡Gracias! Tu respuesta fue recibida con éxito.",
        footer: "Encuesta privada de validación de mercado. Sin visualización pública de respuestas.",
        interest: ["Muy interesado(a)", "Tal vez interesado(a)", "Solo curioso(a)"],
        topics: [
          "IA para descubrimiento de enzimas",
          "Anotación de genomas",
          "Análisis de metabarcoding",
          "Análisis de metagenómica",
          "Minería de biosíntesis de productos naturales",
          "Machine learning para biología",
          "Bioinformática para biotecnología industrial",
          "Agente de IA para bioinformática",
          "Chatbot de bioinformática"
        ],
        formats: ["Online en vivo", "Online grabado", "Híbrido", "Presencial"],
        live: ["Brasil", "Fuera de Brasil"],
        background: ["Estudiante de grado", "Estudiante de posgrado", "Investigador(a)", "Profesional de la industria", "Otro"],
        updates: ["Sí", "No"],
        opportunities: ["Servicios", "Colaboración", "Consultoría", "No, solo cursos/herramientas"]
      }
    };

    let currentLang = "pt";

    const metaDescription = document.querySelector('meta[name="description"]');
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDescription = document.querySelector('meta[property="og:description"]');
    const form = document.getElementById("interestForm");
    const successMessage = document.getElementById("successMessage");

    function renderChoiceGroup(containerId, name, options, type = "radio") {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      options.forEach((labelText, index) => {
        const id = `${name}_${index}`;
        const item = document.createElement("label");
        item.className = "option";
        item.setAttribute("for", id);

        const input = document.createElement("input");
        input.type = type;
        input.id = id;
        input.name = type === "checkbox" ? `${name}[]` : name;
        input.value = labelText;
        if (type === "radio") input.required = true;

        const span = document.createElement("span");
        span.textContent = labelText;

        item.appendChild(input);
        item.appendChild(span);
        container.appendChild(item);
      });
    }

    function setText() {
      const t = i18n[currentLang];
      document.documentElement.lang = t.htmlLang;

      document.title = t.title;
      metaDescription.setAttribute("content", t.metaDescription);
      ogTitle.setAttribute("content", t.ogTitle);
      ogDescription.setAttribute("content", t.ogDescription);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
      });

      renderChoiceGroup("interestOptions", "interest_level", t.interest, "radio");
      renderChoiceGroup("topicOptions", "topics_interest", t.topics, "checkbox");
      renderChoiceGroup("formatOptions", "preferred_format", t.formats, "radio");
      renderChoiceGroup("liveOptions", "where_live", t.live, "radio");
      renderChoiceGroup("backgroundOptions", "background", t.background, "radio");
      renderChoiceGroup("updatesOptions", "receive_updates", t.updates, "radio");
      renderChoiceGroup("opportunityOptions", "other_opportunities", t.opportunities, "checkbox");

      successMessage.textContent = t.success;
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        currentLang = btn.dataset.lang;
        document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        setText();
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: data,
          headers: { Accept: "application/json" }
        });

        if (response.ok) {
          form.style.display = "none";
          successMessage.style.display = "block";
        } else {
          alert("Error sending response. Please try again.");
        }
      } catch {
        alert("Connection error. Please try again.");
      }
    });

    setText();
  </script>
</body>
</html>
